<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeter Taxi</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap" defer></script>
    <script>
        let map, marker;

        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: -34.397, lng: 150.644 },
                zoom: 8,
            });
            marker = new google.maps.Marker({
                position: map.getCenter(),
                map: map,
            });

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const pos = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude,
                    };
                    marker.setPosition(pos);
                    map.setCenter(pos);
                }, () => {
                    handleLocationError(true, map.getCenter());
                });
            } else {
                handleLocationError(false, map.getCenter());
            }
        }

        function handleLocationError(browserHasGeolocation, pos) {
            alert(browserHasGeolocation ? 'Error: The Geolocation service failed.' : 'Error: Your browser doesn\'t support geolocation.');
        }

        function setPickupLocation() {
            // Code to set pickup location based on marker position
        }

        function setDropoffLocation() {
            // Code to set dropoff location based on marker position
        }
    </script>
</head>
<body>
    <h1>Welcome to Meeter Taxi</h1>
    <div id="map" style="height: 400px; width: 100%;"></div>
    <button onclick="setPickupLocation()">Set Pickup Location</button>
    <button onclick="setDropoffLocation()">Set Dropoff Location</button>
</body>
</html>
