
<!doctype html>
<html lang="si">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Inventory Management - සරල පද්ධතිය</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-3">
  <div class="container">
    <h1 class="mb-3">Inventory Management (සාම්ප්‍රදායික)</h1>

    <div class="row mb-3">
      <div class="col-md-8">
        <input id="search" class="form-control" placeholder="නමෙන් හෝ SKU අනුව සෙවීම..." />
      </div>
      <div class="col-md-4 text-end">
        <button id="btn-refresh" class="btn btn-secondary">නවීක��ණය</button>
        <button id="btn-export" class="btn btn-success">Export CSV</button>
      </div>
    </div>

    <div class="mb-3">
      <h5>Dashboard</h5>
      <div id="stats" class="mb-2"></div>
    </div>

    <table class="table table-striped" id="items-table">
      <thead>
        <tr>
          <th>නම</th>
          <th>SKU</th>
          <th>ප්‍රමාණය</th>
          <th>එකක මිල</th>
          <th>ස්ථානය</th>
          <th>සංස්කරණය</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <hr/>
    <h5>නව ද්‍රව්‍ය එකතු කිරීම / සංස්කරණය</h5>
    <form id="item-form" class="row g-2">
      <input type="hidden" id="item-id" />
      <div class="col-md-4">
        <input id="name" class="form-control" placeholder="නම" required />
      </div>
      <div class="col-md-2">
        <input id="sku" class="form-control" placeholder="SKU" />
      </div>
      <div class="col-md-2">
        <input id="quantity" type="number" class="form-control" placeholder="ප්‍රමාණය" />
      </div>
      <div class="col-md-2">
        <input id="unit_price" type="number" step="0.01" class="form-control" placeholder="එකක මිල" />
      </div>
      <div class="col-md-2 text-end">
        <button class="btn btn-primary" id="save-btn">නිර්යාත / සුරක්ෂිත</button>
        <button class="btn btn-outline-secondary" id="clear-btn" type="button">Clear</button>
      </div>
    </form>

    <hr/>
    <h5>CSV ආයාත / ආයාත</h5>
    <form id="import-form" enctype="multipart/form-data" class="d-flex gap-2">
      <input type="file" id="csvfile" accept=".csv" class="form-control" />
      <button class="btn btn-info" id="import-btn" type="button">Import</button>
    </form>

  </div>

  <script src="app.js"></script>
</body>
</html>
